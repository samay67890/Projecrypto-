{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="{% url 'favicon' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusCrypto - Verify OTP</title>
    <link rel="stylesheet" href="{% static 'css/verify_otp.css' %}" type="text/css" media="all">
</head>
<body>

    <div class="otp-card">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 64 64" fill="none">
                    <path d="M32 4L8 18v28l24 14 24-14V18L32 4z" fill="#fcd535" opacity="0.15"/>
                    <path d="M32 4L8 18v28l24 14 24-14V18L32 4z" stroke="#fcd535" stroke-width="2" fill="none"/>
                    <path d="M32 16l-12 7v14l12 7 12-7V23L32 16z" fill="#fcd535" opacity="0.3"/>
                    <path d="M32 16l-12 7v14l12 7 12-7V23L32 16z" stroke="#fcd535" stroke-width="1.5" fill="none"/>
                    <circle cx="32" cy="32" r="6" fill="#fcd535"/>
                </svg>
            </div>
            <span class="logo-text">NexusCrypto</span>
        </div>

        <h2>Authentication</h2>
        <p>Please enter the 6-digit verification code sent to <span class="email-highlight">{{ email }}</span></p>

        <form action="{% if google_otp %}{% url 'google_verify_otp' %}{% else %}{% url 'signup_verify_otp' %}{% endif %}" method="post" id="verify-otp-form">
            {% csrf_token %}
            <input type="hidden" name="otp" id="otp-value" value="">

            {% if error %}
            <div class="form-error">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="#f6465d" stroke-width="1.5"/>
                    <path d="M8 4.5v4M8 10.5v.5" stroke="#f6465d" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="otp-input-group" id="otp-container">
                <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" autofocus>
                <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code">
                <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code">
                <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code">
                <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code">
                <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code">
            </div>

            <button type="submit" class="verify-btn" id="verify-btn">Verify Now</button>
        </form>

        <div class="resend-text">
            Didn't receive the code? <a href="{% if google_otp %}{% url 'google_resend_otp' %}{% else %}{% url 'signup_resend_otp' %}{% endif %}" class="resend-link" id="resend-btn">Resend Code</a>
        </div>
    </div>

    <script src="{% static 'js/verify_otp.js' %}"></script>
</body>
</html>
